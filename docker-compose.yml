services:
  # ---Infrastructure------------
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - social-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - social-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - social-net

  # ------ Application Services ------------------

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.dev
    container_name: api-gateway
    ports:
      - "3000:3000"
    env_file:
      - ./api-gateway/.env.docker
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    depends_on:
      - redis
      - identity-service
      - post-service
      - media-service
      - search-service
    networks:
      - social-net

  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile.dev
    container_name: identity-service
    ports:
      - "3001:3001"
    env_file:
      - ./identity-service/.env.docker
    volumes:
      - ./identity-service:/app
      - /app/node_modules
    depends_on:
      - redis
    networks:
      - social-net

  post-service:
    build:
      context: ./post-service
      dockerfile: Dockerfile.dev
    container_name: post-service
    ports:
      - "3002:3002"
    env_file:
      - ./post-service/.env.docker
    volumes:
      - ./post-service:/app
      - /app/node_modules
    depends_on:
      - redis
      - kafka
    networks:
      - social-net

  media-service:
    build:
      context: ./media-service
      dockerfile: Dockerfile.dev
    container_name: media-service
    ports:
      - "3003:3003"
    env_file:
      - ./media-service/.env.docker
    volumes:
      - ./media-service:/app
      - /app/node_modules
    depends_on:
      - redis
      - kafka
    networks:
      - social-net

  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile.dev
    container_name: search-service
    ports:
      - "3004:3004"
    env_file:
      - ./search-service/.env.docker
    volumes:
      - ./search-service:/app
      - /app/node_modules
    depends_on:
      - kafka
      - redis
    networks:
      - social-net

# ---- Network --------------
networks:
  social-net:
    driver: bridge
